name: offline_sync_queue
description: Production-grade offline-first sync queue with Riverpod, Hive, and mock Firestore.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive_flutter: ^1.1.0

  # Networking / Connectivity
  connectivity_plus: ^6.0.3

  # UUID generation for idempotency keys
  uuid: ^4.4.0

  # Structured logging
  logger: ^2.4.0

  # Date formatting for UI
  intl: ^0.19.0

  # Path provider (used by Hive on desktop)
  path_provider: ^2.1.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
